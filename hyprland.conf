# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
# Animations come from the global Omarchy config. Rounding left to global looknfeel.

general {
    # Active border: deep blue -> electric blue -> cyan (Persona 3 Reload energy)
    col.active_border = rgba(1573b8ee) rgba(1ea7ffee) rgba(5fe0eeee) 120deg
    col.inactive_border = rgb(0d1526)
}

group {
    col.border_active = rgba(1ea7ffee) rgba(19c4d8ee) 45deg
    col.border_inactive = rgb(0a0f1c)

    groupbar {
        col.active = rgba(1ea7ffdd)
        col.inactive = rgba(0a0f1caa)
        text_color = rgb(0a0f1c)
        text_color_inactive = rgba(eaf3ffaa)
    }
}

decoration {
    shadow {
        enabled = yes
        range = 16
        color = rgba(00000077)
    }
}
