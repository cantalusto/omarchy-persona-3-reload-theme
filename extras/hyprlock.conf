general {
    fractional_scaling = 2
}

# Colors come from the active Omarchy theme (Persona 3 Reload: navy + electric blue)
source = ~/.config/omarchy/current/theme/hyprlock.conf

background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = $color

    blur_size = 2
    blur_passes = 1
    noise = 0.0117
    contrast = 1.1000
    brightness = 0.7000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# --- CLOCK (HH:MM on one line) ---
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color = $font_color
    font_size = 96
    font_family = JetBrainsMono Nerd Font Propo
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(10, 15, 28, 0.6)

    position = 0, 70
    halign = center
    valign = center
}

# --- DATE (weekday + date) ---
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %d %b')"
    color = rgba(234, 243, 255, 0.80)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Propo

    position = 0, -10
    halign = center
    valign = center
}

# --- GREETING ---
label {
    monitor =
    text = cmd[update:3600000] echo "<b>$(date +%H | awk '{if ($1 < 12) print "Bom dia"; else if ($1 < 18) print "Boa tarde"; else print "Boa noite"}'), $USER</b>"
    color = $outer_color
    font_size = 15
    font_family = JetBrainsMono Nerd Font Propo

    position = 0, -45
    halign = center
    valign = center
}

# --- ROTATING PHRASE (Persona 3 flavor) ---
label {
    monitor =
    text = cmd[update:600000] echo "$(shuf -e 'Memento mori.' 'Time never waits.' 'Burn my dread.' 'The Dark Hour is near.' 'Aeon in motion.' 'One more day.' -n 1)"
    color = rgba(234, 243, 255, 0.50)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Propo

    position = 0, -78
    halign = center
    valign = center
}

# --- LOCK ICON ---
label {
    monitor =
    text = 󰌾
    color = $outer_color
    font_size = 16
    font_family = JetBrainsMono Nerd Font Propo

    position = 0, 180
    halign = center
    valign = bottom
}

# --- PASSWORD FIELD ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3

    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true

    rounding = 22
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    check_color = $check_color
    fail_color = $check_color
    fade_on_empty = true
    placeholder_text = Digite a senha

    position = 0, 110
    halign = center
    valign = bottom
}
